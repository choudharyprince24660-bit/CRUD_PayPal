<div class="container mt-4">

  <h3>Country CRUD</h3>

  <div class="card p-3">

    <input class="form-control mb-2"
           placeholder="Country Name"
           [(ngModel)]="country.name">

    <input class="form-control mb-2"
           placeholder="Country Code"
           [(ngModel)]="country.code">

    <button class="btn btn-success me-2" (click)="save()">
      {{ isEdit ? 'Update' : 'Save' }}
    </button>

    <button class="btn btn-secondary" (click)="reset()">Clear</button>

  </div>

  <table class="table table-bordered mt-4">

    <thead>
      <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Code</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let c of countries">
        <td>{{c.id}}</td>
        <td>{{c.name}}</td>
        <td>{{c.code}}</td>
        <td>
          <button class="btn btn-primary btn-sm" (click)="edit(c)">Edit</button>
          <button class="btn btn-danger btn-sm ms-2" (click)="delete(c.id)">Delete</button>
        </td>
      </tr>
    </tbody>

  </table>

</div>
